name: Docs Unit Tests

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  docs-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Validate docs structure data
        run: pnpm --filter docs validate:structure

      - name: Run docs unit tests
        run: pnpm --filter docs test:unit
