name: hpe-design-tokens tests

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  hpe-design-tokens-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run hpe-design-tokens tests
        run: pnpm --filter hpe-design-tokens test
