name: Token Preview PR Check

on:
  pull_request:
    branches:
      - master
    paths:
      - package.json
      - pnpm-lock.yaml
      - scripts/verify-token-preview.mjs
      - packages/hpe-design-tokens/**
      - shared/hooks/**
      - sandbox/grommet-app/**

jobs:
  token-preview-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify token preview pipeline
        run: pnpm run verify:token-preview

      - name: Annotate token preview failure
        if: ${{ failure() }}
        run: echo "::error title=Token Preview Verification Failed::Run 'pnpm run verify:token-preview' locally for details."
