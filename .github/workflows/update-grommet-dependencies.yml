name: Update HPE Design System Dependencies

on:
  schedule:
    # Run daily at 9 AM UTC to check for new releases
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual triggering
  # TODO: remove before merging — temporary trigger for testing on branch
  push:
    branches:
      - chore/deps-grommet-updates

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Check and update Grommet versions
        id: update
        run: |
          # Extract current versions
          CURRENT_GROMMET=$(grep "^  grommet: \^" pnpm-workspace.yaml | head -1 | sed 's/.*grommet: //' | tr -d "'^~")
          CURRENT_THEME=$(grep "^  grommet-theme-hpe: \^" pnpm-workspace.yaml | head -1 | sed 's/.*grommet-theme-hpe: //' | tr -d "'^~")
          CURRENT_TOKENS=$(grep "^  hpe-design-tokens: \^" pnpm-workspace.yaml | head -1 | sed 's/.*hpe-design-tokens: //' | tr -d "'^~")

          # Get latest versions
          LATEST_GROMMET=$(pnpm view grommet version)
          LATEST_THEME=$(pnpm view grommet-theme-hpe version)
          LATEST_TOKENS=$(pnpm view hpe-design-tokens version)

          # Check if updates needed
          UPDATES_NEEDED=false
          CHANGELOG=""

          if [ "$CURRENT_GROMMET" != "$LATEST_GROMMET" ]; then
            UPDATES_NEEDED=true
            sed -i "/^catalog:/,/^catalogs:/ s/grommet: \^.*/grommet: ^${LATEST_GROMMET}/" pnpm-workspace.yaml
            CHANGELOG="${CHANGELOG}### Grommet ${CURRENT_GROMMET} → ${LATEST_GROMMET}\n"
            CHANGELOG="${CHANGELOG}[Release Notes](https://github.com/grommet/grommet/releases/tag/v${LATEST_GROMMET})\n\n"
          fi

          if [ "$CURRENT_THEME" != "$LATEST_THEME" ]; then
            UPDATES_NEEDED=true
            sed -i "/^catalog:/,/^catalogs:/ s/grommet-theme-hpe: \^.*/grommet-theme-hpe: ^${LATEST_THEME}/" pnpm-workspace.yaml
            CHANGELOG="${CHANGELOG}### Grommet Theme HPE ${CURRENT_THEME} → ${LATEST_THEME}\n"
            CHANGELOG="${CHANGELOG}[Release Notes](https://github.com/grommet/grommet-theme-hpe/releases/tag/v${LATEST_THEME})\n\n"
          fi

          if [ "$CURRENT_TOKENS" != "$LATEST_TOKENS" ]; then
            UPDATES_NEEDED=true
            sed -i "/^catalog:/,/^catalogs:/ s/hpe-design-tokens: \^.*/hpe-design-tokens: ^${LATEST_TOKENS}/" pnpm-workspace.yaml
            CHANGELOG="${CHANGELOG}### HPE Design Tokens ${CURRENT_TOKENS} → ${LATEST_TOKENS}\n"
            CHANGELOG="${CHANGELOG}[Release Notes](https://github.com/grommet/hpe-design-system/releases/tag/hpe-design-tokens%40${LATEST_TOKENS})\\n\\n"
          fi

          echo "updates-needed=${UPDATES_NEEDED}" >> $GITHUB_OUTPUT
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update lockfile
        if: steps.update.outputs.updates-needed == 'true'
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Set current date
        id: date
        if: steps.update.outputs.updates-needed == 'true'
        run: echo "yyyymmdd=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Create PR with updates
        if: steps.update.outputs.updates-needed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: master
          branch: chore/deps-grommet-${{ steps.date.outputs.yyyymmdd }}
          title: 'chore: Update HPE Design System dependencies'
          commit-message: |
            chore: update HPE Design System catalog dependencies

            Auto-generated dependency updates
          body: |
            ## 🚀 HPE Design System Dependency Updates

            ${{ steps.update.outputs.changelog }}

            🤖 Auto-generated by dependency update workflow
          labels: dependencies,automated-pr
          draft: false
