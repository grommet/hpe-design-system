id: checkbox
name: CheckBox
description: A form control for presenting individual or grouped binary choices, supporting checked, unchecked, and indeterminate states.
importPath: grommet
props:
  - name: checked
    type: boolean
    required: false
    description: Whether the checkbox is checked.
    defaultValue: false
  - name: disabled
    type: boolean
    required: false
    description: Prevents the user from interacting with the checkbox.
    defaultValue: false
  - name: id
    type: string
    required: false
    description: DOM id attribute for the underlying input element.
  - name: indeterminate
    type: boolean
    required: false
    description: >-
      Whether the checkbox is in an indeterminate state, used when a parent
      checkbox represents a subset of checked children.
    defaultValue: false
  - name: label
    type: string | React.ReactNode
    required: false
    description: Accessible label and visible text for the checkbox.
  - name: name
    type: string
    required: false
    description: Name attribute of the underlying input element, used within a form.
  - name: onChange
    type: (event: React.ChangeEvent<HTMLInputElement>) => void
    required: false
    description: Callback fired when the checked state changes.
  - name: pad
    type: string | object
    required: false
    description: Padding around the checkbox control.
  - name: reverse
    type: boolean
    required: false
    description: Whether to render the label before the checkbox control.
    defaultValue: false
  - name: toggle
    type: boolean
    required: false
    description: Whether to render the checkbox as a toggle switch.
    defaultValue: false
usage:
  whenToUse:
    - Allowing a user to opt in to or acknowledge something, such as a privacy policy or terms and conditions.
    - Serving as a UI control that shows or hides page content when no form submission is needed.
    - Allowing an item to be selected within a list, table row, or dropdown.
    - Presenting a group of options where the user may select multiple items simultaneously.
  whenToAvoid:
    - Do not use CheckBox when only one option may be selected from a list — use RadioButtonGroup instead.
    - Do not use CheckBox as a primary action trigger — use Button instead.
variants:
  - name: default
    description: Standard square checkbox used inside or outside a FormField.
    when: Presenting a binary choice within a form or as a standalone opt-in control.
  - name: toggle
    description: >-
      Renders the checkbox as a toggle switch, typically with text to the left
      and the toggle to the right.
    when: >-
      When the user controls a single on/off setting and the change takes effect
      immediately without form submission.
examples:
  - description: CheckBox inside a FormField
    path: apps/docs/src/examples/components/checkbox/CheckBoxSimpleExample.js
  - description: Toggle variant
    path: apps/docs/src/examples/components/checkbox/CheckBoxToggleExample.js
  - description: Validation state
    path: apps/docs/src/examples/components/checkbox/CheckBoxValidationExample.js
  - description: Disabled state
    path: apps/docs/src/examples/components/checkbox/CheckBoxDisabledExample.js
  - description: CheckBox outside of FormField
    path: apps/docs/src/examples/components/checkbox/CheckBoxSolelyExample.js
anatomy:
  - label: '1'
    region: Checkbox control
    purpose: The interactive square element that reflects and toggles the checked state.
    availability: required
    notes: Renders as a toggle switch when the toggle prop is true.
  - label: 1a
    region: Checkmark indicator
    purpose: Visual indicator of the checked state.
    availability: optional
    notes: >-
      Visible only when checked; replaced by a dash in the indeterminate state.
  - label: '2'
    region: Label
    purpose: Provides the accessible name and visible description for the checkbox.
    availability: optional
    notes: >-
      Required for accessibility unless aria-label or aria-labelledby is
      provided externally.
behaviors:
  interactiveStates:
    - rest
    - hover
    - focus
    - active
  applicationStates:
    - disabled
    - indeterminate
    - checked
    - validation error
contentGuidelines:
  - Use concise, action-oriented label text that clearly describes what selecting the checkbox means.
  - Avoid double negatives in labels such as "Do not disable notifications."
  - When used in a group, ensure each label is distinct and does not merely repeat the group heading.
dosAndDonts:
  - do: Use CheckBox inside a FormField when help text, error messages, or validation feedback may be needed.
    dont: >-
      Do not also set a label prop on the FormField when the CheckBox already has
      a label — this creates duplicate associated labels.
    reason: >-
      Two associated label elements for a single input breaks screen reader
      behavior and causes accessibility violations.
  - do: Provide a clear, descriptive label prop for every CheckBox.
    dont: Do not render a CheckBox without a label prop, aria-label, or aria-labelledby.
    reason: Unlabeled controls are inaccessible to screen reader users.
  - do: Use the toggle variant for immediate on/off controls that take effect without form submission.
    dont: Do not use a toggle in place of a standard checkbox within a form submission workflow.
    reason: Toggles imply instant effect; checkboxes imply a deferred action on submit.
accessibility:
  keyboard:
    - key: Space
      action: Toggles the checked state of a focused checkbox.
    - key: Tab
      action: Moves focus to the next focusable element.
    - key: Shift + Tab
      action: Moves focus to the previous focusable element.
  aria:
    - attribute: aria-checked
      value: true | false | mixed
      condition: Reflects checked, unchecked, or indeterminate state respectively.
    - attribute: aria-label
      value: descriptive string
      condition: When no visible label prop is provided.
    - attribute: aria-labelledby
      value: id of labeling element
      condition: When a visible label element exists outside the component.
    - attribute: aria-disabled
      value: 'true'
      condition: When the disabled prop is true.
  wcag:
    - criterion: 1.3.1 Info and Relationships
      status: pass
    - criterion: 1.4.3 Contrast (Minimum)
      status: pass
    - criterion: 2.1.1 Keyboard
      status: pass
    - criterion: 2.4.7 Focus Visible
      status: pass
    - criterion: 4.1.2 Name, Role, Value
      status: pass
  wcagDataFile: checkbox
relatedComponents:
  - CheckBoxGroup
  - RadioButtonGroup
  - Select
