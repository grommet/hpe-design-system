id: menu
name: Menu
description: >-
  Menu presents a set of related actions as a dropdown list triggered by a
  button, enabling users to access contextual operations without cluttering
  the interface.
importPath: grommet
props:
  - name: a11yTitle
    type: string
    required: false
    description: >-
      Accessible title for the menu trigger button. Use for icon-only menus
      that have no visible label to ensure screen reader users understand
      the button's purpose. When provided, an aria-label is added
      to the trigger button.
  - name: alignSelf
    type: "'start' | 'center' | 'end' | 'stretch' | 'baseline'"
    required: false
    description: >-
      How to align along the cross axis when contained in a Box or along the
      column axis when contained in a Grid.
  - name: children
    type: '((props: object) => React.ReactNode) | React.ReactNode'
    required: false
    description: >-
      Custom trigger content. Can be a render function or a React node.
      When using a function, it receives menu state props and should return
      the visual representation.
  - name: disabled
    type: boolean
    required: false
    description: Disables the menu trigger button when true.
    defaultValue: false
  - name: dropAlign
    type: >-
      { top?: 'top' | 'bottom', bottom?: 'top' | 'bottom', left?: 'left' |
      'right', right?: 'left' | 'right' }
    required: false
    description: Alignment of the dropdown relative to the trigger button.
  - name: dropBackground
    type: >-
      string | { color?: string, opacity?: 'weak' | 'medium' | 'strong' |
      boolean | number }
    required: false
    description: Background color or background config for the open dropdown.
  - name: dropProps
    type: object
    required: false
    description: Additional Drop props applied to the dropdown container.
  - name: dropTarget
    type: object
    required: false
    description: >-
      React ref object used as the alignment target for the dropdown.
  - name: gridArea
    type: string
    required: false
    description: The name of the area to place this inside a parent Grid.
  - name: icon
    type: boolean | React.ReactNode
    required: false
    description: Icon shown on the menu trigger.
  - name: items
    type: >-
      { label: string, onClick?: () => void, icon?: React.ReactNode, gap?:
      string }[]
    required: true
    description: >-
      Array of menu items. Each item may include a label, a click handler,
      and an icon. Items can be grouped using sub-arrays separated by
      dividers.
  - name: justifyContent
    type: "'start' | 'center' | 'end' | 'between' | 'around' | 'stretch'"
    required: false
    description: How to align trigger contents along the row axis.
  - name: label
    type: string | React.ReactNode
    required: false
    description: Label displayed on the menu trigger button.
  - name: margin
    type: string | object
    required: false
    description: The amount of margin around the component.
  - name: icon
    type: React.ReactNode
    required: false
    description: Icon displayed on the menu trigger button.
  - name: messages
    type: '{ openMenu?: string, closeMenu?: string }'
    required: false
    description: >-
      Custom screen reader announcements for opening and closing the menu.
      Defaults to "Open Menu" and "Close Menu".
  - name: open
    type: boolean
    required: false
    description: Whether the menu is open.
  - name: size
    type: "'xsmall' | 'small' | 'medium' | 'large' | 'xlarge'"
    required: false
    description: Size of the menu trigger button.

usage:
  whenToUse:
    - >-
      Organizing application-level navigation or related user tasks into a
      single accessible location within the application header.
    - >-
      Presenting batch actions for a selected set of data records in a
      toolbar, alongside other controls such as filters and search.
    - >-
      Providing item-specific actions for an individual record within a list
      or table row, especially when space is limited and actions are
      recognized by icon.
  whenToAvoid:
    - >-
      Do not use Menu to allow a user to select a value from a list; use
      Select instead.
    - >-
      Do not use Menu for primary navigation; use Nav with Anchor components
      instead.
    - Do not nest menus within menus.

variants:
  - name: default
    description: >-
      Standard dropdown menu with a visible text label and an implicit
      chevron indicator to communicate expand/collapse behavior.
    when: >-
      When space allows a descriptive label and the menu's purpose benefits
      from a visible name, such as an "Actions" overflow menu in a page
      header or user account menu.
  - name: icon-only
    description: >-
      Compact menu with an icon-only trigger and no visible label. The icon
      communicates the menu's purpose (e.g., ellipsis for overflow, gear
      for settings).
    when: >-
      Space-constrained contexts such as table row actions, toolbars, or
      card overflow menus where a recognized icon clearly communicates
      intent. Always provide an accessible label via a11yTitle.
  - name: toolbar
    description: >-
      Menu styled to integrate visually with a toolbar, using kind="toolbar"
      to maintain visual alignment with adjacent controls.
    when: >-
      When presenting batch actions for a data collection within a toolbar
      alongside filters, search, and other control elements.
  - name: primary
    description: >-
      Menu trigger button styled as a primary button using kind="primary",
      giving it the highest visual prominence on the page.
    when: >-
      When the menu is the primary call-to-action on a page and needs to
      stand out from surrounding controls.
  - name: secondary
    description: >-
      Menu trigger button styled as a secondary button using kind="secondary",
      providing a prominent but subordinate alternative to a primary action.
    when: >-
      When the menu must be clearly differentiated from surrounding controls
      but should not compete with a primary action.
  - name: with-dividers
    description: >-
      Menu that groups related actions with dividers between them. Pass an
      array of arrays to the items prop — each inner array is a group, and
      a divider is automatically rendered between groups.
    when: >-
      When the menu contains multiple logical groupings of actions and
      dividers help users scan and understand the available options.

