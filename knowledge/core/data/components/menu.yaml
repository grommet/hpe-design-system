    path: apps/docs/src/examples/components/menu/MenuDefaultExample.js
  - description: Icon-only menu using a compact trigger for space-constrained layouts.
    path: apps/docs/src/examples/components/menu/MenuIconExample.js
  - description: Toolbar-style menu integrated visually alongside other toolbar controls.
    path: apps/docs/src/examples/components/menu/MenuToolbarExample.js
