    path: apps/docs/src/examples/components/menu/MenuKindExample.js
  - description: >-
      Menu using grouped items (array of arrays) to automatically render
      dividers between related action groups.
    path: apps/docs/src/examples/components/menu/MenuDividersExample.js

anatomy:
  - label: '1'
    region: Menu button
    purpose: Opens the menu when clicked.
    availability: required
    notes: Can include a label, icon, or both.
  - label: 1a
    region: Button label
    purpose: Describes the menu's function or the category of actions.
    availability: optional
  - label: 1b
    region: Button icon
    purpose: Provides a visual cue that the menu can be opened or closed.
    availability: optional
    notes: >-
      Typically an arrow or chevron to indicate expand/collapse. For
      icon-only menus, the icon represents the menu's purpose or the type
      of actions (e.g., settings gear, overflow dots).
  - label: '2'
    region: Drop container
    purpose: Holds and displays the list of menu items when the menu is expanded.
    availability: required
  - label: '3'
    region: Menu item
    purpose: Represents an individual action within the menu.
    availability: required
    notes: Items should be organized logically (see Organizing menu items).
  - label: 3a
    region: Item label
    purpose: Communicates the specific action to the user.
    availability: required
  - label: 3b
    region: Item icon
    purpose: Provides a quick visual reference for the action.
    availability: optional
  - label: '4'
    region: Divider
    purpose: Separates groups of related actions.
    availability: optional

behaviors:
  interactiveStates:
    - rest
    - hover
    - focus
    - active
  applicationStates:
    - disabled

contentGuidelines:
  - >-
    Give the menu a clear, descriptive title that conveys its purpose rather
    than a generic label such as "Menu" (e.g., use "Account information" for
    a menu containing actions like "Change username" or "Reset password").
  - >-
    Keep menu item labels short and action-oriented using simple, concise
    wording (e.g., "Settings" or "Logout") so users immediately understand
    the action that will be performed.

dosAndDonts:
  - do: Use Menu to display a list of actions the user can perform.
    dont: >-
      Do not use Menu to allow a user to select a value; use Select
      instead.
    reason: >-
      Menu is designed for triggering actions, not choosing between values.
      Select is the appropriate component for value selection.
  - do: Use dividers to separate and communicate groupings of related actions.
    dont: Do not use dividers as separators between every individual item.
    reason: >-
      Dividers communicate logical groupings. Overusing them reduces their
      effectiveness and makes the menu harder to scan.
  - do: >-
      Separate dangerous or destructive actions into their own group at the
      end of the menu and require double confirmation before executing.
    dont: >-
      Do not mix dangerous actions with other actions, and do not execute
      destructive actions without a confirmation step.
    reason: >-
      Placing destructive actions last in a distinct location and requiring
      confirmation prevents accidental data loss.
  - do: >-
      Keep the number of menu items to a minimum so users can easily
      understand the full scope of available actions.
    dont: Avoid adding too many options under one menu.
    reason: >-
      A concise menu improves scannability and reduces cognitive load. If
      there are too many items, consider grouping or sub-navigation.

accessibility:
  wcagDataFile: menu
  keyboard:
    - key: Enter / Space
      action: Opens or closes the menu.
    - key: Escape
      action: Closes the menu and returns focus to the trigger button.
    - key: Arrow Down / Arrow Up
      action: Moves focus between menu items when the menu is open.
  aria:
    - attribute: aria-haspopup
      value: 'true'
      condition: always
    - attribute: aria-expanded
      value: 'true | false'
      condition: >-
        Reflects whether the menu drop container is currently open or
        closed.
    - attribute: aria-label
      value: descriptive string
      condition: >-
        When the trigger button uses an icon only with no visible label
        text.
  announcements:
    - trigger: Menu opened
      message: >-
        "Open Menu" by default, or the custom string provided via the
        a11yTitle or messages.openMenu prop.
    - trigger: Menu closed
      message: >-
        "Close Menu" by default, or the custom string provided via the
        a11yTitle or messages.closeMenu prop.

relatedComponents:
  - header
  - select
  - button
  - nav
