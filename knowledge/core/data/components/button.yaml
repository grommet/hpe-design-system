id: button
name: Button
description: A clickable control that triggers an action, submits a form, or initiates
  a new task without navigating away from the current page.
importPath: grommet

props:
  - name: label
    type: string | React.ReactNode
    required: false
    description: Text or content displayed inside the button.
  - name: onClick
    type: "() => void"
    required: false
    description: Callback function invoked when the button is clicked.
  - name: primary
    type: boolean
    required: false
    description: Applies primary styling, giving the button increased visual weight.
    defaultValue: false
  - name: secondary
    type: boolean
    required: false
    description: Applies secondary styling for supporting calls to action.
    defaultValue: false
  - name: kind
    type: "'toolbar'"
    required: false
    description: Applies toolbar styling when the button is placed in a row with other
      toolbar controls.
  - name: icon
    type: React.ReactNode
    required: false
    description: Icon element displayed inside the button, inline with label text or
      as the sole content.
  - name: badge
    type: "boolean | number | { value: number, max?: number }"
    required: false
    description: Adds a small badge indicator to convey extra information such as a
      notification count. Set to true for a dot, pass a number to display the value,
      or pass an object to control the value and its maximum.
  - name: size
    type: "'small' | 'medium' | 'large' | 'xlarge'"
    required: false
    description: Controls the label text size; padding and rounding scale proportionately.
    defaultValue: medium
  - name: disabled
    type: boolean
    required: false
    description: Prevents user interaction and applies disabled styling.
    defaultValue: false
  - name: active
    type: boolean
    required: false
    description: Applies active styling to indicate the current or selected state.
    defaultValue: false
  - name: plain
    type: boolean
    required: false
    description: Removes all default button styling, rendering plain content.
    defaultValue: false
  - name: a11yTitle
    type: string
    required: false
    description: Accessibility label read by screen readers; required for icon-only
      buttons that have no visible label.
  - name: busy
    type: boolean
    required: false
    description: Displays a loading indicator to signal that an action is in progress.
    defaultValue: false
  - name: success
    type: boolean
    required: false
    description: Displays a success indicator after an action has completed.
    defaultValue: false

usage:
  whenToUse:
    - "Submitting a form."
    - "Beginning a new task."
    - "Providing a primary call to action."
    - "Presenting secondary actions alongside a primary action."
    - "Cancelling or dismissing the current screen."
  whenToAvoid:
    - "Do not use a Button for navigation to another URL or page — use an Anchor or Link instead."
    - "Avoid showing a disabled button for actions that don't apply in context; remove it entirely or leave it active with on-click messaging explaining why the action is unavailable."
    - "Do not use a Button as a navigation element inside a list or nav structure — use Nav with Anchors."

variants:
  - name: primary
    description: High-contrast button with increased visual weight; the key call to
      action on a page.
    when: Use once per view for the single most important action, such as saving, creating,
      or deploying.
    example: "<Button label=\"Create device\" primary onClick={() => {}} />"
  - name: secondary
    description: Medium-emphasis button for supporting calls to action that stand alongside
      or complement a primary button.
    when: Use for actions that support the primary action or stand alone; multiple
      secondary buttons may appear per page.
    example: "<Button label=\"View details\" secondary onClick={() => {}} />"
  - name: toolbar
    description: Equal-prominence button styled to sit alongside other toolbar controls
      such as search inputs and action menus.
    when: Use when a button is placed in a toolbar row with peer controls; apply kind="toolbar".
    example: "<Button kind=\"toolbar\" label=\"Filter\" icon={<Filter />} onClick={() => {}} />"
  - name: default
    description: The standard button appearance with no extra visual weight.
    when: Use for the majority of actions on a page where no single action needs elevated
      prominence.
    example: "<Button label=\"Reset\" onClick={() => {}} />"
  - name: icon
    description: Button containing an icon inline with label text, or an icon-only
      button.
    when: Use to reinforce a label with a visual cue, or when space is constrained
      and the icon is self-explanatory; always provide a11yTitle for icon-only buttons.
    example: "<Button icon={<Add />} label=\"Add device\" onClick={() => {}} />"
  - name: badge
    description: Button with a small badge indicator overlaid to show a count or notification
      status.
    when: Use to surface a notification count or attention dot on a button that opens
      a related view.
    example: "<Button aria-label=\"Notifications\" icon={<Notification />} badge={3} />"

examples:
  - description: Default button — the standard appearance used for most actions on
      a page.
    path: apps/docs/src/examples/components/button/ButtonExample.js
  - description: Default button variant example.
    path: apps/docs/src/examples/components/button/DefaultButtonExample.js
  - description: Primary button highlighting the single key action on a page.
    path: apps/docs/src/examples/components/button/PrimaryButtonExample.js
  - description: Secondary button for supporting calls to action.
    path: apps/docs/src/examples/components/button/SecondaryButtonExample.js
  - description: Toolbar button placed alongside other toolbar controls.
    path: apps/docs/src/examples/components/button/ToolbarButtonExample.js
  - description: Button with icon inline or icon-only.
    path: apps/docs/src/examples/components/button/ButtonIconExample.js
  - description: Button with a badge showing a notification count.
    path: apps/docs/src/examples/components/button/ButtonBadgeExample.js
  - description: Button in various interactive and application states (default, active,
      disabled, primary).
    path: apps/docs/src/examples/components/button/ButtonStatesExample.js
  - description: Simple busy and success state button used for short async actions
      such as form validation.
    path: apps/docs/src/examples/components/button/ButtonBusySimpleExample.js
  - description: Busy button in a modal dialog with form submission context.
    path: apps/docs/src/examples/components/button/ButtonBusyExample.js
  - description: Button sizing variants from small to xlarge.
    path: apps/docs/src/examples/components/button/ButtonSizingExample.js
  - description: Button alignment reference table for common layout contexts such as
      modals, drawers, and inline forms.
    path: apps/docs/src/examples/components/button/ButtonAlignmentTable.js
  - description: Left-aligned button group ordering (Primary → Secondary → Default).
    path: apps/docs/src/examples/components/button/ButtonLeftAlignExample.js
  - description: Right-aligned button group ordering (Primary → Secondary → Default).
    path: apps/docs/src/examples/components/button/ButtonRightAlignExample.js
  - description: Do — correct cancel button styling using the default (neutral) appearance.
    path: apps/docs/src/examples/components/button/DosDonts/ButtonGoodCancelPreview.js
  - description: Don't — incorrect cancel button styling using the secondary appearance.
    path: apps/docs/src/examples/components/button/DosDonts/ButtonBadCancelPreview.js
  - description: Do — full-width single button on small screen widths.
    path: apps/docs/src/examples/components/button/DosDonts/ButtonGoodSignUpPreview.js
  - description: Don't — undersized button width on small screen widths.
    path: apps/docs/src/examples/components/button/DosDonts/ButtonBadSignUpPreview.js
  - description: Do — vertically stacked button group on small screen widths.
    path: apps/docs/src/examples/components/button/DosDonts/ButtonGoodLongTitlePreview.js
  - description: Don't — horizontal inline button group on small screen widths.
    path: apps/docs/src/examples/components/button/DosDonts/ButtonBadGroupPreview.js
  - description: Verb–noun action label example showing correct labeling convention
      (primary action includes noun; secondary omits it when context is clear).
    path: apps/docs/src/examples/components/button/ButtonActionLabelsExample.js

anatomy:
  - label: "1"
    region: Button container
    purpose: The interactive element that captures click or keyboard events and communicates
      affordance.
    availability: required
    notes: Rendered as a <button> element for in-page actions; use <a> only when the
      result is navigation to a new URL.
  - label: 1a
    region: Button label
    purpose: Communicates the action the button will perform when activated.
    availability: optional
    notes: Required unless an icon with a11yTitle provides the full accessible name.
  - label: 1b
    region: Button icon
    purpose: Provides a visual cue that reinforces or replaces the label.
    availability: optional
    notes: When used without a visible label, a11yTitle or aria-label must be provided.
  - label: 1c
    region: Badge
    purpose: Conveys additional information such as a notification count or attention
      indicator overlaid on the button.
    availability: optional
behaviors:
  interactiveStates:
    - rest
    - hover
    - focus
    - active
  applicationStates:
    - disabled
    - busy
    - success
  realEstate:
    - responsive
    - overflow

contentGuidelines:
  - "Use clear and concise wording — avoid contractions or colloquialisms."
  - "Ensure the button label matches the action or route destination."
  - "Use verb + noun format for the primary action label (e.g., 'Apply filters', 'Create device')."
  - "The noun may be omitted from labels beyond the primary button if the action is clear and unambiguous (e.g., 'Reset' instead of 'Reset filters')."
  - "Use 'Add' when associating an existing object with another object or set of objects (e.g., 'Add device' to an existing group)."
  - "Use 'New' to open a blank template or canvas for user input before the object is committed (e.g., 'New device' to start configuration)."
  - "Use 'Create' for form submission that creates a new object instance in the system (e.g., 'Create device' after completing configuration)."
  - "For icon toggle buttons, limit labels to 2–3 words; use verbs first (e.g., 'Hide / View', 'Favorite / Unfavorite', 'Like / Dislike')."
  - "Use sentence case capitalization; avoid articles such as 'the' or 'a' in toggle button labels."

dosAndDonts:
  - do: "Use the full verb–noun phrase for the primary action label (e.g., 'Apply filters')."
    dont: "Don't omit the noun from the primary action label — doing so creates ambiguity about what the actions refer to."
    reason: "The primary action must be self-explanatory; subsequent actions can omit the noun when context makes the object obvious."
  - do: "Use default button styling for cancel buttons, placed according to the established hierarchy."
    dont: "Don't use Secondary button styling for a Cancel button."
    reason: "The neutral default appearance signals a non-committal action; secondary styling implies a recommended or supported action."
  - do: "On screen widths ≤ 576px, expand single buttons to fill the full container width."
    dont: "Don't keep button widths small on mobile — smaller press targets lessen visual impact and increase errant clicks."
    reason: "Full-width buttons improve press-target size and visual clarity at small breakpoints; minimum button width is 42px."
  - do: "Reorder button groups vertically on small screen widths so each button achieves its full width."
    dont: "Don't display button groups horizontally inline on small screens — this risks label truncation, word wraps, and undersized press targets."
    reason: "Vertical stacking preserves readable labels and adequate touch targets at all resolutions."

accessibility:
  keyboard:
    - key: Enter / Space
      action: Activates the button and triggers its onClick handler.
    - key: Tab
      action: Moves focus to the next focusable element.
    - key: Shift + Tab
      action: Moves focus to the previous focusable element.
  aria:
    - attribute: aria-label
      value: descriptive string
      condition: When the button has no visible text label (icon-only buttons).
    - attribute: a11yTitle
      value: descriptive string
      condition: HPE Design System prop equivalent to aria-label; use for icon-only
        buttons.
    - attribute: aria-disabled
      value: "true"
      condition: When the button is in a disabled state.
    - attribute: role
      value: button
      condition: Applied automatically by the browser for native <button> elements;
        verify when using a custom element or anchor styled as a button.
  announcements:
    - trigger: Button activated
      message: Screen reader announces the visible label text or a11yTitle value.
  wcagDataFile: button

relatedComponents:
  - anchor
  - menu
  - tabs
