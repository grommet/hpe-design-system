    codeFile: apps/docs/src/examples/components/button/ButtonLeftAlignExample.js

  - description: Right-aligned button group
    codeFile: apps/docs/src/examples/components/button/ButtonRightAlignExample.js

anatomy:
  - label: "1"
    region: Button container
    purpose: Clickable element wrapping all internal parts and delivering the interaction target.
    availability: required

  - label: 1a
    region: Label
    purpose: Communicates the action in plain language.
    availability: optional
    notes: >
      Required when no icon is present. Omit for icon-only buttons and supply
      a11yTitle or aria-label instead.

  - label: 1b
    region: Icon
    purpose: Provides a visual cue reinforcing or replacing the label.
    availability: optional
    notes: Can appear alone or alongside a label. Icon-only usage requires an accessible label.

  - label: 1c
    region: Badge indicator
    purpose: Overlays a count or dot signal to convey extra information.
    availability: optional
    notes: >
      Rendered as a dot (true) or a capped number. Exceeds max renders "+"
      appended (e.g., 9+).

behaviors:
  interactiveStates:
    - rest
    - hover
    - focus
    - active
  applicationStates:
    - disabled
    - busy

contentGuidelines:
  - Start labels with a verb that describes the action (e.g., "Save changes", "Delete device").
  - Use sentence case; avoid title case.
  - Avoid contractions or colloquialisms.
  - Limit labels to 2–4 words where possible.
  - Ensure the label matches the route destination or resulting action.
  - Use "Add" when associating an existing object with another (e.g., "Add device to group").
  - Use "New" to open a blank template for user input before creation (e.g., "New device").
  - Use "Create" for form submission that persists the object (e.g., "Create device").
  - For toggle buttons with icons, limit the accessible label to 2–3 words starting with a verb (e.g., "Hide menu", "Favorite item").

dosAndDonts:
  - do: Use default button styling for cancel buttons.
    dont: Use secondary button styling for a cancel button.
    reason: Secondary styling implies a supporting call to action, not a non-committal dismissal.

  - do: >
      On screen widths ≤ 576px, stretch single buttons to fill the full
      container width.
    dont: Keep buttons at a small fixed width on mobile breakpoints.
    reason: Undersized press targets are difficult to interact with on touch devices.

  - do: >
      Stack button groups vertically on screen widths ≤ 576px so each button
      reaches full width.
    dont: Display button groups inline horizontally on small browser widths.
    reason: Horizontal groups at small widths risk truncation, word wraps, and undersized targets.

  - do: Use a link (anchor) when the action navigates to a new URL.
    dont: Use a button for URL navigation.
    reason: >
      Screen readers announce buttons and links differently — using the wrong
      element misleads users about what will happen next.

accessibility:
  keyboard:
    - key: Space
      action: Activates the button.
    - key: Enter
      action: Activates the button.
    - key: Tab
      action: Moves focus to the next focusable element.
    - key: Shift + Tab
      action: Moves focus to the previous focusable element.
  aria:
    - attribute: aria-label
      value: Descriptive action string
      condition: >
        When the button has no visible text label (icon-only). Equivalent to
        the Grommet a11yTitle prop.
    - attribute: aria-disabled
      value: "true"
      condition: When the disabled prop is set to true.
    - attribute: aria-busy
      value: "true"
      condition: When the busy prop is set to true.
  wcag:
    - criterion: 1.4.3 Contrast (Minimum)
      status: pass
    - criterion: 2.1.1 Keyboard
      status: pass
    - criterion: 4.1.2 Name, Role, Value
      status: conditional

relatedComponents:
  - anchor
  - menu
  - togglegroup
  - toolbar
