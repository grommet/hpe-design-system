id: button
name: Button
description: >
  Triggers an action or event, such as submitting a form, opening a dialog,
  confirming a decision, or navigating within a process step. Distinct from
  an anchor/link, which navigates to a new URL.
importPath: grommet
framework: react

props:
  - name: label
    type: string | React.ReactNode
    required: false
    description: >
      Text or node rendered inside the button. Omit when using icon-only
      buttons and supply a11yTitle or aria-label instead.
  - name: primary
    type: boolean
    required: false
    defaultValue: false
    description: Applies the primary visual style — high contrast, filled background.
  - name: secondary
    type: boolean
    required: false
    defaultValue: false
    description: Applies the secondary visual style — outlined appearance.
  - name: kind
    type: "'toolbar' | 'default'"
    required: false
    defaultValue: default
    description: >
      Controls the button's intent grouping. Use "toolbar" when placing the
      button alongside other toolbar controls to give each control equal visual
      prominence.
  - name: disabled
    type: boolean
    required: false
    defaultValue: false
    description: Disables the button, preventing interaction.
  - name: busy
    type: boolean
    required: false
    defaultValue: false
    description: >
      Indicates an async operation triggered by the button is in progress.
      Use for short server-side validations (a few seconds).
  - name: icon
    type: React.ReactNode
    required: false
    description: Icon rendered inside the button. Can appear with or without a label.
  - name: badge
    type: boolean | number
    required: false
    description: >
      Adds a small indicator overlay. Pass true for a dot, or a number to
      display a count capped at max (default 9), appending "+" when exceeded.
  - name: size
    type: "'small' | 'medium' | 'large'"
    required: false
    defaultValue: medium
    description: Controls label text size. Padding and border-radius scale proportionally.
  - name: onClick
    type: () => void
    required: false
    description: Callback fired when the button is activated.
  - name: a11yTitle
    type: string
    required: false
    description: >
      Accessible label for assistive technologies. Required when the button
      has no visible text label (e.g., icon-only buttons).
  - name: href
    type: string
    required: false
    description: >
      When provided, renders the button as an anchor element. Use only for
      in-app navigation that doesn't constitute a standalone page link.

usage:
  whenToUse:
    - Submitting a form
    - Starting a task or workflow
    - Triggering UI changes
    - Navigating through process steps
    - Toggling between states
  whenToAvoid:
    - Do not use a button when navigating to a new URL or external page — use
      an anchor/link instead.
    - Do not show a disabled button for actions the user lacks permission to
      perform; hide it entirely or leave it active with contextual feedback.
    - Do not apply primary button styling to more than one action per page view.

variants:
  - name: primary
    description: High-contrast, filled button for the single most important action on a page.
    when: >
      One clear, high-value action exists on the page (e.g., Create, Deploy,
      Save). Only one primary button should appear per view.
    example: <Button primary label="Create device" onClick={() => {}} />

  - name: secondary
    description: Outlined button for supporting or standalone calls to action.
    when: >
      The action supports the primary action or stands alone as a call to
      action when no primary button is needed. Multiple secondary buttons may
      coexist on a page.
    example: <Button secondary label="Learn more" onClick={() => {}} />

  - name: toolbar
    description: >
      Flat button with equal visual weight, designed to sit alongside other
      toolbar controls such as a search input, filter button, and action menu.
    when: >
      The button appears as part of a row of toolbar controls where each
      control should share equal visual prominence. Apply kind="toolbar" to
      Button or Button-based components such as Menu.
    example: <Button kind="toolbar" label="Filter" icon={<Filter />} onClick={() => {}} />

  - name: default
    description: Standard appearance used for the majority of actions on a page.
    when: >
      Any action that is not the primary or secondary call to action, and any
      navigation-type sub-action (e.g., Cancel, Go back).
    example: <Button label="Cancel" onClick={() => {}} />

  - name: icon-only
    description: Button displaying only an icon with no visible text label.
    when: >
      Space is constrained and the icon clearly communicates the action.
      Always supply a11yTitle or aria-label.
    example: <Button icon={<Edit />} a11yTitle="Edit item" onClick={() => {}} />

  - name: icon-with-label
    description: Button combining an icon and a text label.
    when: The icon reinforces the label's meaning and additional recognition benefits the user.
    example: <Button icon={<Add />} label="Add device" onClick={() => {}} />

  - name: with-badge
    description: Button with a small overlay indicator conveying a count or attention signal.
    when: >
      The button's associated content has a numeric count or requires
      attention. Use true for a dot indicator; use a number when the count is
      meaningful.
    example: <Button icon={<Notification />} badge={5} a11yTitle="Notifications, 5 unread" />

examples:
  - description: Default button overview
    codeFile: apps/docs/src/examples/components/button/ButtonExample.js

  - description: Primary button
    codeFile: apps/docs/src/examples/components/button/PrimaryButtonExample.js

  - description: Secondary button
    codeFile: apps/docs/src/examples/components/button/SecondaryButtonExample.js

  - description: Toolbar button
    codeFile: apps/docs/src/examples/components/button/ToolbarButtonExample.js

  - description: Default button
    codeFile: apps/docs/src/examples/components/button/DefaultButtonExample.js

  - description: Button with icon
    codeFile: apps/docs/src/examples/components/button/ButtonIconExample.js

  - description: Button with badge
    codeFile: apps/docs/src/examples/components/button/ButtonBadgeExample.js

  - description: Button states (rest, active, disabled)
    codeFile: apps/docs/src/examples/components/button/ButtonStatesExample.js

  - description: Busy button — simple
    codeFile: apps/docs/src/examples/components/button/ButtonBusySimpleExample.js

  - description: Busy button — full modal workflow
    codeFile: apps/docs/src/examples/components/button/ButtonBusyExample.js

