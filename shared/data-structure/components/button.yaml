id: button
name: Button
description: 'Buttons should be used in situations where users might need to: Submit a form, Begin a new task, Trigger a new UI element to appear on the page, or Specify a new or next step in a process.'
importPath: 'grommet'
props: []
usage:
  whenToUse:
    - 'Submit a form'
    - 'Begin a new task'
    - 'Trigger a new UI element to appear on the page'
    - 'Specify a new or next step in a process'
    - "Performing an action on the same page (e.g., 'submit', 'merge', 'create new', 'upload')"
  whenToAvoid:
    - 'Navigating to another place (use a link/anchor instead)'
variants:
  - name: 'primary'
    description: 'Primary buttons highlight actions on a page delivering the most benefit to users. They have increased visual weight through placement and contrast.'
    when: 'Used for the key action on the page, and should only appear once.'
    example: 'apps/docs/src/examples/components/Button/PrimaryButtonExample.js'
  - name: 'secondary'
    description: 'Secondary buttons are used to represent calls to action that are either in support of the primary call to action or stand-alone.'
    when: 'Consider that the 80% use case for some pages is visualization and not action. In cases like these, a secondary button can be used. There can be multiple secondary buttons per page.'
    example: 'apps/docs/src/examples/components/Button/SecondaryButtonExample.js'
  - name: 'toolbar'
    description: 'Toolbar buttons are used when buttons are placed in a row with other toolbar controls.'
    when: 'A common use case would be when creating a filtering experience. The intent is to present each control with equal prominence.'
    example: 'apps/docs/src/examples/components/Button/ToolbarButtonExample.js'
  - name: 'default'
    description: 'This is the default appearance and behavior of button.'
    when: 'The majority of buttons on your page should use this form of button. All other supporting actions should use Default button. Used for any navigation-type actions.'
    example: 'apps/docs/src/examples/components/Button/DefaultButtonExample.js'
  - name: 'icon'
    description: 'Icons may be incorporated into buttons, either inline with text or as an icon only.'
    when: 'Show the current state of the button through the use of an icon.'
    example: 'apps/docs/src/examples/components/Button/ButtonIconExample.js'
  - name: 'badge'
    description: 'The badge prop adds a small indicator to a Button to convey extra information, such as a notification or count.'
    when: 'To indicate that something is new or needs attention, or to show how many items there are.'
    example: 'apps/docs/src/examples/components/Button/ButtonBadgeExample.js'
  - name: 'cancel'
    description: 'Cancel buttons enable users to exit out of or dismiss the current screen in order to go back to the previous one.'
    when: 'Having an explicit way to cancel provides a fallback to safety as it helps discard any unwanted changes. Always use default button styling.'
  - name: 'toggle'
    description: 'Toggle buttons are used either to switch between two states, such as checked and unchecked, or to trigger two actions like on or off.'
    when: 'When toggling a value or state, such as Hide/View, Light/Dark, Like/Dislike.'
examples:
  - description: 'Button Overview'
    code: ''
    codeFile: 'apps/docs/src/examples/components/Button/ButtonExample.js'
  - description: 'Button Left Align Example'
    code: ''
    codeFile: 'apps/docs/src/examples/components/Button/ButtonLeftAlignExample.js'
  - description: 'Button Right Align Example'
    code: ''
    codeFile: 'apps/docs/src/examples/components/Button/ButtonRightAlignExample.js'
  - description: 'Button States Example'
    code: ''
    codeFile: 'apps/docs/src/examples/components/Button/ButtonStatesExample.js'
  - description: 'Button Busy Simple Example'
    code: ''
    codeFile: 'apps/docs/src/examples/components/Button/ButtonBusySimpleExample.js'
  - description: 'Button Busy Example'
    code: ''
    codeFile: 'apps/docs/src/examples/components/Button/ButtonBusyExample.js'
  - description: 'Button Sizing Example'
    code: ''
    codeFile: 'apps/docs/src/examples/components/Button/ButtonSizingExample.js'
behaviors:
  interactiveStates:
    - 'active'
    - 'busy'
    - 'success'
  applicationStates:
    - 'disabled'
contentGuidelines:
  - 'Button labeling: Use clear and concise wording. Avoid contractions or colloquialisms. Keep the language approachable but not personal. Ensure your button label matches the route destination.'
  - 'When to use ADD: Used to build an association between an existing object and another object or set of objects (e.g. Add device).'
  - 'When to use NEW: Opens a template or blank canvas of a given object type to allow for user input. Object is not added to a database until Create or submission is done (e.g. New device).'
  - 'When to use CREATE: Typically used for form submission to submit user input and create an instance of an object (e.g. Create device).'
dosAndDonts:
  - do: 'Use a link when you’re navigating to another place, such as: a "view all" page, "Jane Chen" profile, a page "skip link" etc.'
    dont: 'Use buttons to navigate to another page.'
  - do: 'Use buttons when you are performing an action on the same page, such as: "submit," "merge," "create new," "upload," etc.'
    dont: 'Use links for actions that occur on the same page.'
  - do: 'Place the primary button first, followed by Secondary, then by Default.'
    dont: 'Order buttons randomly or out of hierarchy.'
  - do: 'Align buttons where the user most expects it, generally according to the Button alignment guide (right-aligned in modals/wizards, left-aligned in page headers/forms).'
    dont: 'Align buttons inconsistently.'
accessibility:
  aria:
    - attribute: 'aria-label'
      value: ''
      condition: 'For buttons with icons ONLY, inform the user of what will happen when the button is clicked.'
