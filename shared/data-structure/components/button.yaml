contentGuidelines:
  - Ensure to apply an appropriate label so the user has a clear understanding of what action to expect.
  - Use clear and concise wording.
  - Avoid contractions or colloquialisms. Keep the language approachable but not personal.
  - Ensure your button label matches the route destination.
  - For icon buttons, limit to 2-3 descriptive words and use verbs first (e.g. "Hide/View", "Switch/Unswitch", "Favorite/Unfavorite").
  - Use sentence case capitalization. Words such as "the" and "a" should be avoided.
dosAndDonts:
  - do: Always use default button styling for cancel button, and keep it aligned in accordance with use case, following the hierarchy.
    dont: Don't use Secondary Button styling for Cancel button.
  - do: On small resolutions, full-width buttons help users more easily identify and interact with actions on smaller browser widths and when using the press gesture.
    dont: On small resolutions, keeping button widths smaller lessen their visual impact and makes it more difficult for users to interact with them on smaller browser widths.
  - do: Reorder the button group vertically on smaller screens to ensure each individual button is given enough space to be easily read and actioned on.
    dont: Horizontal, inline button groups on smaller browser widths create opportunities for truncation, word wraps, and undersized press targets.
anatomy:
  - label: '1'
    region: 'Icon'
    purpose: 'Provides visual context for the action.'
    availability: 'optional'
  - label: '2'
    region: 'Label'
    purpose: 'Describes the action the button performs.'
    availability: 'required'
