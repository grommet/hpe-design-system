id: button
name: Button
description: |
  Buttons should be used in situations where users might need to:
  - Submit a form
  - Begin a new task
  - Trigger a new UI element to appear on the page
  - Specify a new or next step in a process
importPath: grommet
props: []
usage:
  whenToUse:
    - Use buttons when you are performing an action, such as "submit", "merge", "create new", "upload", etc.
    - An action almost always occurs on the same page.
    - Highlight actions on a page delivering the most benefit to users.
  whenToAvoid:
    - Do not use a link/anchor when you’re performing a primary action.
    - Conversely, do not use a button when navigating to another place, such as a "view all" page, profile, or "skip link" (use an anchor).
    - Do not show inapplicable buttons as disabled; remove them completely from the UI instead.
variants:
  - name: primary
    description: Highlights actions on a page delivering the most benefit to users, unlocking new value by enabling a new experience or creation.
    when: Used for the key action on the page, and should only appear once.
  - name: secondary
    description: Calls to action that are either in support of the primary call to action or stand-alone.
    when: There can be multiple secondary buttons per page. Can be used when the 80% use case for some pages is visualization and not action.
  - name: toolbar
    description: Used when buttons are placed in a row with other toolbar controls.
    when: Presenting each control (like search input, filter button, action menu) with equal prominence. Apply `kind="toolbar"`.
  - name: default
    description: The neutral appearance signifies a non-committal or typical action. This is the standard behavior of a button.
    when: The majority of buttons on your page should use this form, including Cancel buttons or secondary navigation-type actions.
  - name: icon-only
    description: Icons incorporated into buttons without inline text.
    when: Useful for showing the current state of a button (like toggle buttons) or action buttons on mobile devices where space is limited. Must have an `a11yTitle` or `aria-label`.
  - name: badge
    description: Adds a small indicator to a Button to convey extra information, such as a notification or count.
    when: Used to indicate that something is new/needs attention (simple dot) or to show how many items there are (number).
  - name: busy / success
    description: Communicates that the button's action is currently processing or has succeeded.
    when: When an action may take a couple of seconds to complete or validate (like server-side validation). If longer, do not use busy state.
