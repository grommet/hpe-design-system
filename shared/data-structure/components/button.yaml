id: button
name: Button
description: >
  Triggers an action or event, such as submitting a form, opening a dialog,
  confirming a decision, or navigating within a process step. Distinct from
  an anchor/link, which navigates to a new URL.
importPath: grommet
framework: react

props:
  - name: label
    type: string | React.ReactNode
    required: false
    description: >
      Text or node rendered inside the button. Omit when using icon-only buttons
      and supply a11yTitle or aria-label instead.
  - name: primary
    type: boolean
    required: false
    defaultValue: false
    description: Applies the primary visual style — high contrast, filled background.
  - name: secondary
    type: boolean
    required: false
    defaultValue: false
    description: Applies the secondary visual style — outlined appearance.
  - name: kind
    type: "'toolbar' | 'default'"
    required: false
    defaultValue: default
    description: >
      Controls the button's intent grouping. Use "toolbar" when placing the button
      alongside other toolbar controls (e.g., a search input and a filter button)
      to give each control equal visual prominence.
  - name: disabled
    type: boolean
    required: false
    defaultValue: false
    description: >
      Disables the button, preventing interaction. Prefer leaving buttons active
      and showing contextual messaging on click rather than using disabled.
  - name: busy
    type: boolean
    required: false
    defaultValue: false
    description: >
      Indicates that an async operation triggered by the button is in progress.
      Use for short server-side validations (a few seconds). For longer operations,
      release the button and notify the user separately.
  - name: icon
    type: React.ReactNode
    required: false
    description: Icon rendered inside the button. Can appear with or without a label.
  - name: badge
    type: boolean | number
    required: false
    description: >
      Adds a small indicator overlay on the button. Pass true for a dot
      (new/attention), or a number to display a count. The count is capped at the
      max value (default 9) and renders "+" when exceeded (e.g., 9+).
  - name: size
    type: "'small' | 'medium' | 'large'"
    required: false
    defaultValue: medium
    description: >
      Controls the label text size. Padding and border-radius scale proportionally.
  - name: onClick
    type: () => void
    required: false
    description: Callback fired when the button is activated.
  - name: a11yTitle
    type: string
    required: false
    description: >
      Accessible label used by assistive technologies. Required when the button
      has no visible text label (e.g., icon-only buttons).
  - name: href
    type: string
    required: false
    description: >
      When provided, renders the button as an anchor element. Use only for
      in-app navigation that doesn't constitute a standalone page link.

usage:
  whenToUse:
    - Submitting a form
    - Starting a task or workflow
    - Triggering UI changes
    - Navigating through process steps
    - Toggling between states
  whenToAvoid:
    - Do not use a button when navigating to a new URL or external page — use an
      anchor/link instead.
    - Do not show disabled buttons for actions the user lacks permission to perform;
      hide them entirely or leave them active with contextual feedback.
    - Do not apply primary button styling to more than one action per page view.

variants:
  - name: primary
    description: High-contrast, filled button used for the single most important action on a page.
    when: >
      There is one clear, high-value action on the page (e.g., Create, Deploy, Save).
      Only one primary button should appear per view.
    example: <Button primary label="Create device" onClick={() => {}} />

  - name: secondary
    description: Outlined button used for supporting or standalone calls to action.
    when: >
      The action supports the primary action or stands alone as a call to action
      when a primary button is not needed. Multiple secondary buttons may coexist
      on a page.
    example: <Button secondary label="Learn more" onClick={() => {}} />

  - name: toolbar
    description: >
      Flat button with equal visual weight, designed to sit alongside other toolbar
      controls (e.g., search input, filter, and action menu).
    when: >
      The button appears as part of a row of toolbar controls where each control
      should have equal visual prominence. Apply kind="toolbar" to Button or
      Button-based components such as Menu.
    example: <Button kind="toolbar" label="Filter" icon={<Filter />} onClick={() => {}} />

  - name: default
    description: Standard button appearance used for the majority of actions on a page.
    when: >
      Any action that is not the primary or secondary call to action, and any
      navigation-type sub-action (e.g., Cancel, Go back).
    example: <Button label="Cancel" onClick={() => {}} />

  - name: icon-only
    description: Button displaying only an icon with no visible text label.
    when: >
      Space is constrained and the icon clearly communicates the action. Always
      supply a11yTitle or aria-label for screen readers.
    example: <Button icon={<Edit />} a11yTitle="Edit item" onClick={() => {}} />

  - name: icon-with-label
    description: Button combining an icon and a text label.
    when: >
      The icon reinforces the label's meaning and additional recognition benefits
      the user.
    example: <Button icon={<Add />} label="Add device" onClick={() => {}} />

  - name: with-badge
    description: Button with a small overlay indicator conveying a count or attention signal.
    when: >
      The button's associated content or action has a numeric count (e.g., unread
      notifications) or requires attention. Use the boolean form for a simple dot
      indicator and the numeric form when the count is meaningful.
    example: <Button icon={<Notification />} badge={5} a11yTitle="Notifications, 5 unread" />

  - name: toggle
    description: Button used to switch between two states (e.g., active/inactive, on/off).
    when: >
      The button toggles between two discrete states and the current state must
      remain visible. Icon buttons in this pattern must expose the current state
      via an icon and communicate the resulting state via a11yTitle or aria-label.

